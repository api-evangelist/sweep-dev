aid: sweep-dev
name: Sweep
description: >-
  Sweep is a San Francisco-based, Y Combinator-backed company (originally
  launched as "Sweep — AI-powered junior developer") that has pivoted from
  being a GitHub App which turned issues into pull requests into an AI
  coding assistant delivered primarily as a JetBrains IDE plugin, with
  autocomplete-only support for VS Code and Zed. The current Sweep product
  pairs a proprietary "Tab model" next-edit autocomplete with an in-IDE
  Agent for chat, inline editing, AI commit messages, and AI code review
  across IntelliJ IDEA, PyCharm, WebStorm, GoLand, PhpStorm, Rider, Android
  Studio, RustRover, RubyMine, CLion, and Aqua. The plugin indexes the
  local codebase for context, supports Remote MCP Servers with OAuth, web
  search and fetch tools, and ships under a commercial credit-based pricing
  model (Free Trial, Basic $10/mo, Pro $20/mo, Ultra $60/mo) with
  enterprise SOC 2 and zero-data-retention options via contact sales.
  Sweep has no public developer REST API, no SDK, and no documented
  webhooks; the company's primary distribution surfaces are the JetBrains
  Marketplace, the VS Code Marketplace, and the Zed extension registry,
  and its open-source footprint on GitHub has narrowed to research forks
  (SWE-bench, SGLang), tokenizer/diff utilities (bpe-qwen, difflib-rs),
  and the now-legacy sweepai/sweep repository that documented the original
  GitHub PR agent. Sweep is profiled here as an AI developer-experience
  vendor rather than as an API provider.
